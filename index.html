<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Digital - Ing. Germán Ruz</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="tarjeta-contenedor">
        
        <header class="header-logo">
            <div class="logo-principal">MeumProyect</div>
            <h1 class="nombre-asesora">Ing. Germán Ruz</h1>
            <div class="puesto-subtitulo">Asesor</div>
            <p class="slogan">Tu Idea - Tu Proyecto</p>
        </header>

        <main class="botones-contenedor">
            
            <a href="#" class="boton-interactivo boton-principal" id="btn-instalar">
                <i class="fa-solid fa-mobile-screen-button icono"></i>
                <div class="texto-boton">
                    <span class="accion">Agregar a la Pantalla</span>
                    <span class="detalle">Instala la tarjeta en tu dispositivo</span>
                </div>
            </a>

            <a href="tel:+521234567890" class="boton-interactivo">
                <i class="fa-solid fa-phone icono"></i>
                <div class="texto-boton">
                    <span class="accion">Llamar Ahora</span>
                </div>
            </a>

            <div class="botones-grid">
                <a href="sms:+521234567890" class="boton-interactivo">
                    <i class="fa-solid fa-comment-sms icono"></i>
                    <span class="etiqueta-mini">Mensaje</span>
                </a>
                
                <a href="mailto:correo@meumproyect.com" class="boton-interactivo">
                    <i class="fa-solid fa-envelope icono"></i>
                    <span class="etiqueta-mini">Correo</span>
                </a>
                
                <a href="https://wa.me/521234567890" class="boton-interactivo" target="_blank">
                    <i class="fa-brands fa-whatsapp icono"></i>
                    <span class="etiqueta-mini">WhatsApp</span>
                </a>
                
                <a href="https://meumproyect-ia.github.io/-Inicio/" class="boton-interactivo" target="_blank">
                    <i class="fa-solid fa-globe icono"></i>
                    <span class="etiqueta-mini">Web</span>
                </a>
            </div>

            <a href="https://maps.app.goo.gl/rAzK3hJFRz3h3Jju7" target="_blank">
    <i class="fa-solid fa-location-dot icono-ubicacion"" class="boton-interactivo boton-ancho" target="_blank">
                <i class="fa-solid fa-location-dot icono-ubicacion"></i>
                <div class="texto-ubicacion">
                    <span class="accion">Ubicación - Servicios</span>
                    <span class="detalle">Asesoría - Diseño - Logística - Desarrollo</span>
                </div>
            </a>

        </main>
    </div>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        const btnInstalar = document.getElementById('btn-instalar');
        btnInstalar.addEventListener('click', (e) => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    deferredPrompt = null;
                });
            } else {
                alert("Ya puedes instalar la app desde el icono en la barra de direcciones del navegador.");
            }
        });

        document.querySelectorAll('.boton-interactivo').forEach(boton => {
            boton.addEventListener('click', function() {
                this.classList.add('click-animacion');
                setTimeout(() => { this.classList.remove('click-animacion'); }, 400);
            });
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
